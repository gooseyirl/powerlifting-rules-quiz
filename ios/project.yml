name: PowerliftingQuiz
options:
  bundleIdPrefix: com.gooseco
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "12.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.7.2"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.gooseco.technicalrulesquiz
    INFOPLIST_FILE: PowerliftingQuiz/Resources/Info.plist
    DEVELOPMENT_TEAM: "RG72PZGLF9"

targets:
  PowerliftingQuizTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PowerliftingQuizTests
    dependencies:
      - target: PowerliftingQuiz
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"

  PowerliftingQuiz:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PowerliftingQuiz/Sources
      - path: PowerliftingQuiz/Resources
      - path: ../shared/questions.json
        buildPhase: resources
        group: Shared
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gooseco.technicalrulesquiz
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "PowerliftingQuiz AppStore"
    info:
      path: PowerliftingQuiz/Resources/Info.plist
      properties:
        CFBundleDisplayName: Powerlifting Quiz
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        GADApplicationIdentifier: "ca-app-pub-3826192057448984~6959601142"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSUserTrackingUsageDescription: "This app uses advertising to remain free. Allow tracking to receive ads that are more relevant to you."
